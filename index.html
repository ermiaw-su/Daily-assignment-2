<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css?family=Spartan&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: url("https://s3-us-west-2.amazonaws.com/s.cdpn.io/38816/image-from-rawpixel-id-2044837-jpeg.jpg") center center no-repeat;
      /* background-size: cover; */
      width: 100vw;
      height: 100vh;
      display: grid;
      align-items: center;
      justify-items: center;
      font-size: 12pt;
      font-family: 'Spartan', sans-serif;
      color: #2A293E;
    }

    .contact-us {
      background: #f8f4e5;
      padding: 50px 100px;
      border-top: 10px solid #f45702;
    }

    label, input, textarea {
      display: block;
      width: 100%;
      font-size: 12pt;
      line-height: 24pt;
      font-family: 'Spartan', sans-serif;
    }

    input {
      margin-bottom: 24pt;
    }

    h3 {
      font-weight: normal;
      font-size: 10pt;
      line-height: 24pt;
      font-style: italic;
      margin: 0 0 .5em 0;
    }

    span {
      font-size: 8pt;
    }

    em {
      color: #f45702;
      font-weight: bold;
    }

    input, textarea {
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 2px;
      background: #f8f4e5;
      padding-left: 5px;
      outline: none;
    }

    input:focus, textarea:focus {
      border: 1px solid #6bd4b1;
    }

    textarea {
      resize: none;
    }

    button {
      display: block;
      float: right;
      line-height: 24pt;
      padding: 0 20px;
      border: none;
      background: #f45702;
      color: white;
      letter-spacing: 2px;
      transition: .2s all ease-in-out;
      border-bottom: 2px solid transparent;
      outline: none;
      cursor: pointer;
    }

    button:hover {
      background: inherit;
      color: #f45702;
      border-bottom: 2px solid #f45702;
    }

    ::selection {
      background: rgb(255, 199, 184);
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus {
      border: 1px solid #6bd4b1;
      -webkit-text-fill-color: #2A293E;
      -webkit-box-shadow: 0 0 0px 1000px #f8f4e5 inset;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>

<body>

  <div class="contact-us">
    <form id ="contactForm">
      <img src="logopestapora.png">
      <label for="customerName">
        NAME 
        <em>*</em>
      </label>
      <input type="text" id="customerName" name="customerName" required>

      <label for="customerEmail">
        EMAIL 
        <em>*</em>
      </label>
      <input type="email" id="customerEmail" name="customerEmail" required>

      <label for="customerPhone">PHONE</label>
      <input 
        type="tel" 
        id="customerPhone" 
        name="customerPhone" 
      >

      <label for="orderNumber">ORDER NUMBER</label>
      <input type="text" id="orderNumber" name="orderNumber">

      <label for="customerNote">
        YOUR MESSAGE 
        <em>*</em>
      </label>
      <textarea rows="4" id="customerNote" name="customerNote" required></textarea>

      <h3>
        Please provide all the information about your issue you can.
      </h3>

      <label for="spamProtection">
        SPAM PROTECTION 
        <em>*</em>
        <span>&nbsp;&nbsp;&nbsp;&nbsp;What day comes before March 11th?</span>
      </label>
      <input type="text" id="spamProtection" name="spamProtection">

      <button id="customerOrder">SUBMIT</button>

    </form>
  </div>

  <script>
    document.getElementById("contactForm").addEventListener("submit", async function(e){

    e.preventDefault()

    const data = {
    name: document.getElementById("customerName").value,
    email: document.getElementById("customerEmail").value,
    phone: document.getElementById("customerPhone").value,
    order_number: document.getElementById("orderNumber").value,
    message: document.getElementById("customerNote").value
    }

    try {

    const response = await fetch("http://localhost:8080/contact", {
    method: "POST",
    headers: {
    "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
    })

    const text = await response.text()

    alert(text)

    } catch(error) {

        alert("Failed to connect to server")

    }

    })
    </script>
</body>
</html>
